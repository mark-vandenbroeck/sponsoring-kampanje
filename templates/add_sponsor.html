{% extends "base.html" %}

{% block title %}Nieuwe Sponsor - Sponsoring De Kampanje{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-plus me-3"></i>
            Nieuwe Sponsor
        </h1>
        <p class="lead mb-0">Voeg een nieuwe sponsor toe</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-building me-2"></i>
                    Sponsor Details
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="naam" class="form-label">Naam *</label>
                        <input type="text" class="form-control" id="naam" name="naam" required>
                    </div>
                    
                    <h6 class="mt-4 mb-3">Adres</h6>
                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label for="straat" class="form-label">Straat</label>
                                <input type="text" class="form-control" id="straat" name="straat">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="huisnummer" class="form-label">Huisnummer</label>
                                <input type="text" class="form-control" id="huisnummer" name="huisnummer">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="postcode" class="form-label">Postcode</label>
                                <input type="text" class="form-control" id="postcode" name="postcode">
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label for="gemeente" class="form-label">Gemeente</label>
                                <input type="text" class="form-control" id="gemeente" name="gemeente">
                            </div>
                        </div>
                    </div>
                    
                    <h6 class="mt-4 mb-3">Kontakt Informatie</h6>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="kontaktpersoon" class="form-label">Kontaktpersoon</label>
                                <input type="text" class="form-control" id="kontaktpersoon" name="kontaktpersoon">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="telefoon" class="form-label">Telefoon</label>
                                <input type="tel" class="form-control" id="telefoon" name="telefoon">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="btw_nummer" class="form-label">BTW-nummer</label>
                                <input type="text" class="form-control" id="btw_nummer" name="btw_nummer">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="bestuurslid_id" class="form-label">Bestuurslid</label>
                        <select class="form-control" id="bestuurslid_id" name="bestuurslid_id">
                            <option value="">Selecteer bestuurslid (optioneel)</option>
                            {% for bestuurslid in bestuursleden %}
                            <option value="{{ bestuurslid.id }}">
                                {{ bestuurslid.naam or bestuurslid.initialen }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <h6 class="mt-4 mb-2">Opmerkingen</h6>
                    <div class="mb-3">
                        <input type="hidden" id="opmerkingen" name="opmerkingen">
                        <div class="rich-text-editor" data-target="opmerkingen" style="min-height: 120px;"></div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('sponsors') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>
                            Terug
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
