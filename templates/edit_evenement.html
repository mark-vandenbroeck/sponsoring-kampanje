{% extends "base.html" %}

{% block title %}Evenement Bewerken - Sponsoring De Kampanje{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container-fluid">
        <h1 class="page-title">
            <i class="fas fa-edit me-3"></i>
            Evenement Bewerken
        </h1>
        <p class="lead mb-0">{{ evenement.naam }}</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-calendar-alt me-2"></i>
                    Evenement Details
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="evenementcode" class="form-label">Evenementcode *</label>
                                <input type="text" class="form-control" id="evenementcode" name="evenementcode" value="{{ evenement.evenementcode }}" required>
                                <div class="form-text">Korte unieke code voor het evenement</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="datum" class="form-label">Datum *</label>
                                <input type="date" class="form-control" id="datum" name="datum" value="{{ evenement.datum.strftime('%Y-%m-%d') }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="naam" class="form-label">Volledige Naam *</label>
                        <input type="text" class="form-control" id="naam" name="naam" value="{{ evenement.naam }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="locatie" class="form-label">Locatie *</label>
                        <input type="text" class="form-control" id="locatie" name="locatie" value="{{ evenement.locatie }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="omschrijving" class="form-label">Omschrijving</label>
                        <div class="rich-text-editor" data-target="omschrijving"></div>
                        <input type="hidden" id="omschrijving" name="omschrijving" value="{{ evenement.omschrijving or '' }}">
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('evenement_detail', id=evenement.id) }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>
                            Annuleren
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize the rich text editor with existing content
    const omschrijvingEditor = document.querySelector('.rich-text-editor[data-target="omschrijving"]');
    const omschrijvingInput = document.getElementById('omschrijving');
    
    if (omschrijvingEditor && omschrijvingInput) {
        const quill = new Quill(omschrijvingEditor, {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link'],
                    ['clean']
                ]
            }
        });
        
        // Set initial content
        if (omschrijvingInput.value) {
            quill.root.innerHTML = omschrijvingInput.value;
        }
        
        // Sync with hidden input
        quill.on('text-change', function() {
            omschrijvingInput.value = quill.root.innerHTML;
        });
    }
});
</script>
{% endblock %}
