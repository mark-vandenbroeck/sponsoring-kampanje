{% extends "base.html" %}

{% block title %}Nieuwe Aanbrenger - Sponsoring De Kampanje{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-plus me-3"></i>
            Nieuwe Aanbrenger
        </h1>
        <p class="lead mb-0">Voeg een nieuwe aanbrenger toe</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-user me-2"></i>
                    Aanbrenger Details
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="initialen" class="form-label">Initialen *</label>
                        <input type="text" class="form-control" id="initialen" name="initialen" required maxlength="10">
                        <div class="form-text">Korte initialen van de aanbrenger</div>
                    </div>

                    <div class="mb-3">
                        <label for="naam" class="form-label">Volledige Naam</label>
                        <input type="text" class="form-control" id="naam" name="naam">
                        <div class="form-text">Volledige naam van de aanbrenger (optioneel)</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('bestuursleden.list') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>
                            Terug
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
