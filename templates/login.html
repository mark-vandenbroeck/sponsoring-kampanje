{% extends "base.html" %}

{% block title %}Inloggen - Sponsoring De Kampanje{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h2 class="card-title">
                            <i class="fas fa-lock me-2"></i>
                            Inloggen
                        </h2>
                        <p class="text-muted">Voer je gegevens in om in te loggen</p>
                    </div>
                    
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Wachtwoord</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Laat leeg als je voor het eerst inlogt">
                            <div class="form-text">
                                <i class="fas fa-info-circle me-1"></i>
                                <strong>Nieuwe gebruiker?</strong> Laat het wachtwoord veld leeg en je wordt gevraagd om een wachtwoord in te stellen.
                            </div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Inloggen
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
