<!DOCTYPE html>
<html>

<head>
    <style>
        @page {
            size: A4 portrait;
            margin: 1cm;
        }

        body {
            font-family: Helvetica, sans-serif;
            font-size: 10px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .amount {
            text-align: right;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 8px;
            color: #666;
        }
    </style>
</head>

<body>
    <h1>Kontrakten Overzicht</h1>
    <table>
        <thead>
            <tr>
                <th>Evenement</th>
                <th>Kontrakt</th>
                <th>Bedrag</th>
            </tr>
        </thead>
        <tbody>
            {% for k in kontrakten %}
            <tr>
                <td>{{ k.evenement.naam }}</td>
                <td>{{ k.kontrakt }}</td>
                <td class="amount">€ {{ "%.2f"|format(k.bedrag) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="footer">
        Gegenereerd op: {{ current_date }}
    </div>
</body>

</html>
