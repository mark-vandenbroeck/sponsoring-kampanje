{% extends "base.html" %}

{% block title %}Nieuw Kontrakt - Sponsoring De Kampanje{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-plus me-3"></i>
            Nieuw Kontrakt
        </h1>
        <p class="lead mb-0">Voeg een nieuw kontrakt toe</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-file-contract me-2"></i>
                    Kontrakt Details
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="evenement_id" class="form-label">Evenement *</label>
                        <select class="form-control" id="evenement_id" name="evenement_id" required>
                            <option value="">Selecteer evenement</option>
                            {% for evenement in evenementen %}
                            <option value="{{ evenement.id }}" {% if request.args.get('evenement_id') == evenement.id|string %}selected{% endif %}>
                                {{ evenement.naam }} ({{ evenement.datum.strftime('%d/%m/%Y') }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="kontrakt" class="form-label">Kontrakt Naam *</label>
                        <input type="text" class="form-control" id="kontrakt" name="kontrakt" required>
                        <div class="form-text">Naam van het kontrakt type</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="bedrag" class="form-label">Bedrag *</label>
                        <input type="number" step="0.01" class="form-control" id="bedrag" name="bedrag" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tegenprestatie" class="form-label">Tegenprestatie</label>
                        <div class="rich-text-editor" data-target="tegenprestatie"></div>
                        <input type="hidden" id="tegenprestatie" name="tegenprestatie">
                        <div class="form-text">Beschrijving van wat de sponsor krijgt in ruil</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('kontrakten') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>
                            Terug
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
